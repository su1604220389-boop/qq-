<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试</title>
    <script src="api-config.js"></script>
</head>
<body>
    <h1>API测试</h1>
    <div id="results"></div>
    
    <script>
        const resultsDiv = document.getElementById('results');
        
        // 测试API路径
        function testApiPath(path) {
            return new Promise((resolve, reject) => {
                const fullUrl = window.location.origin + '/' + path;
                console.log('测试API路径:', fullUrl);
                
                fetch(fullUrl, {
                    method: 'OPTIONS',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                })
                .then(response => {
                    resolve({
                        path: path,
                        status: response.status,
                        statusText: response.statusText,
                        success: response.ok
                    });
                })
                .catch(error => {
                    resolve({
                        path: path,
                        status: 'ERROR',
                        statusText: error.message,
                        success: false
                    });
                });
            });
        }
        
        // 测试所有API路径
        async function testAllApis() {
            resultsDiv.innerHTML = '<p>正在测试API路径...</p>';
            
            const apiPaths = Object.values(API_CONFIG);
            const results = [];
            
            for (const path of apiPaths) {
                const result = await testApiPath(path);
                results.push(result);
            }
            
            // 显示结果
            let html = '<h2>测试结果</h2>';
            html += '<table border="1" cellpadding="5" cellspacing="0">';
            html += '<tr><th>API路径</th><th>状态</th><th>结果</th></tr>';
            
            results.forEach(result => {
                const statusClass = result.success ? 'success' : 'error';
                html += `<tr class="${statusClass}">`;
                html += `<td>${result.path}</td>`;
                html += `<td>${result.status}</td>`;
                html += `<td>${result.success ? '成功' : '失败'}</td>`;
                html += '</tr>';
            });
            
            html += '</table>';
            resultsDiv.innerHTML = html;
        }
        
        // 测试存储目录是否存在
        async function testStorage() {
            const storageTest = document.createElement('div');
            storageTest.innerHTML = '<h2>存储测试</h2>';
            resultsDiv.appendChild(storageTest);
            
            try {
                // 尝试访问storage目录
                const response = await fetch('storage/', {
                    method: 'GET'
                });
                
                if (response.ok) {
                    storageTest.innerHTML += '<p>✓ storage目录可访问</p>';
                } else {
                    storageTest.innerHTML += '<p>✗ storage目录不可访问（状态：' + response.status + '）</p>';
                }
            } catch (error) {
                storageTest.innerHTML += '<p>✗ storage目录访问错误：' + error.message + '</p>';
            }
        }
        
        // 运行测试
        window.onload = async () => {
            await testAllApis();
            await testStorage();
        };
    </script>
    
    <style>
        .success { background-color: #d4edda; }
        .error { background-color: #f8d7da; }
        table { border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 8px; text-align: left; }
    </style>
</body>
</html>
